name: Finance Agent MCP - CI

on:
  push:
    branches: ['**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install ruff  # Adicionamos o Linter aqui
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔍 Rodar Linter (Ruff)
        run: ruff check .  # Verifica se o código segue as boas práticas

      - name: ✅ Verificar imports do projeto
        run: |
          python -c "import app.main" || echo "Aviso: app.main não encontrado"
          python -c "import mcp_server.server" || echo "Aviso: mcp_server.server não encontrado"
          python -c "import llm.client_gemini" || echo "Aviso: llm.client_gemini não encontrado"

      - name: 🧪 Rodar testes (se existirem)
        run: |
          python -m unittest discover tests
